name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      mutants_scope:
        description: "cargo-mutants scope to run"
        required: false
        default: targeted
        type: choice
        options:
          - targeted
          - full
          - custom
          - skip

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Format, Clippy, Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

  supply-chain:
    name: Supply Chain (audit, deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: supply-chain-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            supply-chain-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Install cargo-audit and cargo-deny
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --locked
          fi

      - name: cargo audit
        run: cargo audit --deny warnings

      - name: cargo deny
        run: cargo deny check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: verify
    env:
      COVERAGE_FAIL_UNDER_LINES: 80
      COVERAGE_FAIL_UNDER_REGIONS: 80
      COVERAGE_FAIL_UNDER_FUNCTIONS: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: coverage-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Run coverage
        run: tools/ci/coverage.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            target/llvm-cov/coverage-summary.json
            target/llvm-cov/lcov.info
            target/llvm-cov/html/
          if-no-files-found: warn

  mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 45
    env:
      MUTANTS_SCOPE: ${{ github.event.inputs.mutants_scope || 'targeted' }}
      CARGO_MUTANTS_JOBS: 2
      CARGO_MUTANTS_MINIMUM_TEST_TIMEOUT: 20
      # Used only when MUTANTS_SCOPE=custom. Space-separated globs are passed to
      # cargo-mutants as repeated --file filters.
      CARGO_MUTANTS_FILES: ${{ vars.CARGO_MUTANTS_FILES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: mutants-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            mutants-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Install cargo-mutants
        run: |
          if ! command -v cargo-mutants >/dev/null 2>&1; then
            cargo install cargo-mutants --locked
          fi

      - name: Run cargo-mutants
        run: tools/ci/mutants.sh "${MUTANTS_SCOPE}"

      - name: Upload mutation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-mutants
          path: target/cargo-mutants/mutants.out/
          if-no-files-found: warn
