name: Fuzz

# Coverage-guided fuzzing of the wire parsers. This workflow is deliberately
# separate from the stable Quality workflow: cargo-fuzz requires a nightly
# toolchain, so it must never gate normal PRs. It runs on a weekly schedule and
# on demand. A crash uploads the reproducer as an artifact and fails the job.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to run each fuzz target"
        required: false
        default: "120"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        target:
          - dtls_record
          - dtls_handshake
          - dtls_client_hello
          - dtls_server_hello
          - dtls_hello_verify
          - coap_message
          - tlv_set
          - dataset
          - ecjpake_kkpp
          - ecjpake_key_exchange
          - net_diag_data
          - udp_rx
          - join_fin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            fuzz/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi

      - name: Run ${{ matrix.target }}
        run: |
          cargo fuzz run "${{ matrix.target }}" -- \
            -max_total_time="${{ github.event.inputs.max_total_time || '120' }}"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
